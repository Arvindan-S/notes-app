version: 0.2

env:
  variables:
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 774525420036.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t notes-app:$IMAGE_TAG .
      - docker tag notes-app:$IMAGE_TAG 774525420036.dkr.ecr.ap-south-1.amazonaws.com/notes-app:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push 774525420036.dkr.ecr.ap-south-1.amazonaws.com/notes-app:$IMAGE_TAG

      - echo Creating imagedefinitions.json...
      - printf '[{"name":"notes-app-container","imageUri":"774525420036.dkr.ecr.ap-south-1.amazonaws.com/notes-app:%s"}]' $IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json